# AAHA / Veterinary Practice Chart of Accounts — Canonical Taxonomy
#
# Best-effort taxonomy for The Animal Doctor SOC, modelled on the AAHA
# (American Animal Hospital Association) Chart of Accounts framework that
# is the de-facto standard among US private-practice CPAs.
#
# The full AAHA Chart of Accounts is paywalled behind AAHA membership.
# This file is a synthesis of:
#   - AAHA's publicly published "Chart of Accounts" structure summary
#   - VMG-shared chart-of-accounts conventions used by member practices
#   - QuickBooks for Veterinary Practice templates (Patterson, AVImark,
#     Henry Schein guides)
#   - Common GL code ranges used by vet-CPAs (Burzenski, KatzSapper, VMG)
#
# CONFIRM-WITH-CPA: Angelo's CPA should review the leaf categories
# against actual practice books before this is treated as ground truth.
#
# Conventions used:
#   GL code blocks (typical, not strict):
#     1xxx — Assets
#     2xxx — Liabilities
#     3xxx — Equity
#     4xxx — Revenue / Income
#     5xxx — Cost of Goods Sold
#     6xxx — Personnel / Payroll
#     7xxx — Facility / Occupancy
#     8xxx — Marketing & General Admin
#     9xxx — Other / Below the line
#
# Each leaf carries:
#   name              human-friendly leaf label
#   gl_code           4-digit code from the typical AAHA-aligned ranges
#   description       1-line explanation
#   keyword_anchors   words/phrases the bookkeeper agent should match in
#                     vendor names, invoice descriptions, statement memos
#   typical_vendors   real-world vendor names commonly seen on this leaf
#   confidence_floor  minimum confidence threshold; vendors not seen
#                     before should auto-flag below this
#
# Leaf entities will be seeded into the knowledge graph as
# entity_type='account_category', category='aha_taxonomy', and embedded
# so the Bookkeeper Agent can semantic-search them.

version: "2026-05-09"
