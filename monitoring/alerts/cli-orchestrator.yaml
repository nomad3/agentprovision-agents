# PrometheusRule CRD — CLI orchestrator alerts (Phase 3 commit 4).
# Lands the 4 alerts from design §4.1.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cli-orchestrator-alerts
  labels:
    app: cli-orchestrator
    role: alert-rules
spec:
  groups:
    - name: cli-orchestrator.rules
      rules:
        # ── Page: classifier drift ───────────────────────────────────
        - alert: CliOrchestratorUnknownFailureRateHigh
          expr: |
            sum(rate(cli_orchestrator_status_total{status="unknown_failure"}[15m]))
            /
            sum(rate(cli_orchestrator_status_total[15m]))
            > 0.05
          for: 15m
          labels:
            severity: page
            service: cli-orchestrator
          annotations:
            summary: "CLI orchestrator UNKNOWN_FAILURE rate > 5% (classifier drift)"
            description: |
              UNKNOWN_FAILURE rate over the last 15min is above 5% — the classifier
              is no longer recognising failure shapes. Investigate the
              cli_orchestrator_status_total UNKNOWN drill-down panel.
              SLO target: < 1% over any rolling 1-hour window.

        # ── Page: fallback storm tripwire ─────────────────────────────
        - alert: CliOrchestratorFallbackDepthStorm
          expr: |
            histogram_quantile(0.99,
              sum by (le) (rate(cli_orchestrator_fallback_depth_bucket[5m]))
            ) > 2
          for: 5m
          labels:
            severity: page
            service: cli-orchestrator
          annotations:
            summary: "CLI orchestrator p99 fallback depth > 2 (storm starting)"
            description: |
              The §3.1 recursion gate should prevent this; a p99 depth above 2
              over 5 minutes means a class of requests is walking the chain
              hard. Could be a quota outage at one provider or a broken
              preflight signature on another.

        # Phase 3 review C2 fix: `tenant_id` removed from Prometheus labels
        # to bound cardinality. The two alerts below are reshaped to
        # platform-level aggregates; per-tenant slicing now lives in the
        # RLExperience JSONB rows + structured logs (see executor.py
        # `_emit_metrics` `logger.info` extras). Operators drilling into
        # an alert use the dashboard's RL-state-text query for tenant
        # attribution.

        # ── Ticket: NEEDS_AUTH rate climbing WoW (per platform) ──────
        - alert: CliOrchestratorNeedsAuthRateWoWClimbing
          expr: |
            (
              sum by (platform) (rate(cli_orchestrator_status_total{status="needs_auth"}[1h]))
              /
              (
                sum by (platform) (rate(cli_orchestrator_status_total{status="needs_auth"}[1h] offset 7d))
                + 0.001
              )
            ) > 1.20
          for: 30m
          labels:
            severity: ticket
            service: cli-orchestrator
          annotations:
            summary: "CLI orchestrator NEEDS_AUTH rate up >20% WoW on {{ $labels.platform }}"
            description: |
              Credential rot — CLI tokens for this platform are expiring
              more often than they used to. Drill into the dashboard's
              RL-state-text query (filter by status=needs_auth, time
              window matching the alert) to identify which tenants are
              affected; open tickets to nudge them into reconnecting.

        # ── Ticket: API_DISABLED rate (per platform) ─────────────────
        - alert: CliOrchestratorApiDisabledRate
          expr: |
            sum by (platform) (
              rate(cli_orchestrator_status_total{status="api_disabled"}[1h])
            ) > 0
          for: 1h
          labels:
            severity: ticket
            service: cli-orchestrator
          annotations:
            summary: "CLI orchestrator API_DISABLED on {{ $labels.platform }}"
            description: |
              A tenant's cloud API isn't enabled — onboarding regression.
              Could mean a GCP project lost the generativelanguage API
              binding or GitHub Copilot was disabled org-wide. Use the
              RL-state-text query (status=api_disabled) to identify the
              tenant. Customer success follow-up.

        # ── Phase 3 C3: emit-failure surfacing ───────────────────────
        # Page when the best-effort RL mirror or webhook emit path is
        # silently failing — without this alert, a Phase-3 cutover
        # regression that breaks RL training data accrual or webhook
        # subscriber notifications would have ZERO observable signal.
        - alert: CliOrchestratorEmitErrorRateHigh
          expr: |
            sum by (kind) (rate(cli_orchestrator_emit_error_total[5m])) > 0
          for: 5m
          labels:
            severity: page
            service: cli-orchestrator
          annotations:
            summary: "CLI orchestrator emit failures: kind={{ $labels.kind }}"
            description: |
              Best-effort emitter (RL mirror, webhook fan-out, metrics,
              or shadow-mode comparison) has been failing for 5 minutes.
              The chat hot path is unaffected — try/except wraps every
              emitter — but downstream observability (RL training data,
              webhook subscribers, Prometheus dashboards) is degrading.
              Check the WARN-level log lines:
                logger=app.services.agent_router
                logger=cli_orchestrator.executor
              for stack traces from the swallow site.
