name: Docker Cleanup (Daily)

on:
  schedule:
    # Every day at 4am UTC (1am Chile)
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Docker disk usage (before)
        run: docker system df 2>/dev/null || true

      - name: Prune dangling images
        run: docker image prune -f 2>/dev/null || true

      - name: Prune build cache (keep last 10GB)
        run: docker builder prune -f --keep-storage 10GB 2>/dev/null || true

      - name: Prune unused volumes
        run: docker volume prune -f 2>/dev/null || true

      - name: Aggressive cleanup if low disk
        run: |
          AVAIL_GB=$(docker run --rm --privileged alpine df / 2>/dev/null | tail -1 | awk '{print int($4/1024/1024)}')
          echo "Available: ${AVAIL_GB:-unknown}GB"
          if [ "${AVAIL_GB:-0}" -lt 20 ]; then
            echo "Low disk — removing ALL unused images"
            docker image prune -af 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true
          fi

      - name: Docker disk usage (after)
        run: docker system df 2>/dev/null || true

      - name: Summary
        run: |
          AVAIL_GB=$(docker run --rm --privileged alpine df / 2>/dev/null | tail -1 | awk '{print int($4/1024/1024)}')
          echo "## Docker Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "Available disk: **${AVAIL_GB:-unknown}GB**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker system df 2>/dev/null >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
