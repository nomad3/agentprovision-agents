name: CLI Build Matrix

# PR-D-1 of the agentprovision CLI distribution track. Validates that
# `agentprovision-cli` + `agentprovision-core` build cleanly on every target
# triple we ship binaries for. Runs on every PR that touches the CLI/core
# crates or this workflow itself; PR-D-2 reuses the same matrix to publish
# release artifacts on cli-v* tags.
#
# Strategy:
#   - Native runners for darwin (macos-14 arm64, macos-13 intel) + windows-x64
#     where `cargo build` runs unmodified.
#   - cargo zigbuild for both Linux musl targets + Windows ARM64 cross-compile,
#     because Zig as the linker is faster + lighter than the cross Docker image
#     and avoids glibc-version drift entirely (musl is fully static).
#
# Reference: docs/plans/2026-05-10-agentprovision-cli-distribution-plan.md

on:
  push:
    branches: [main]
    paths:
      - 'apps/agentprovision-cli/**'
      - 'apps/agentprovision-core/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/cli-build-matrix.yaml'
  pull_request:
    paths:
      - 'apps/agentprovision-cli/**'
      - 'apps/agentprovision-core/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/cli-build-matrix.yaml'
  workflow_dispatch:

concurrency:
  group: cli-build-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native macOS — both architectures available as GHA runners
          - target: aarch64-apple-darwin
            runner: macos-14
            tool: cargo
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13
            tool: cargo
            archive_ext: tar.gz
          # Linux musl-only — fully static, runs on any glibc / Alpine / RHEL
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-22.04
            tool: zigbuild
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-22.04
            tool: zigbuild
            archive_ext: tar.gz
          # Windows
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            tool: cargo
            archive_ext: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            tool: zigbuild
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (rust-toolchain.toml resolves channel + targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            apps/agentprovision-cli/target
            apps/agentprovision-core/target
          key: cli-${{ matrix.target }}-${{ hashFiles('apps/agentprovision-cli/Cargo.lock', 'apps/agentprovision-core/Cargo.toml', 'apps/agentprovision-cli/Cargo.toml') }}
          restore-keys: |
            cli-${{ matrix.target }}-

      - name: Install zig (linux + windows-aarch64 only)
        if: matrix.tool == 'zigbuild'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.tool == 'zigbuild'
        run: cargo install --locked cargo-zigbuild

      - name: cargo fmt --check
        working-directory: apps/agentprovision-cli
        run: cargo fmt --all -- --check

      - name: clippy
        working-directory: apps/agentprovision-cli
        run: cargo clippy --target ${{ matrix.target }} --all-targets -- -D warnings

      - name: Build (cargo)
        if: matrix.tool == 'cargo'
        working-directory: apps/agentprovision-cli
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (zigbuild)
        if: matrix.tool == 'zigbuild'
        working-directory: apps/agentprovision-cli
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Smoke test (--version on native runners only)
        # ARM Linux + ARM Windows can't run their own binaries on the x64
        # runner; native macOS + Windows-x64 + Linux-x64 (musl runs on any
        # glibc) all can.
        if: matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin' || matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          BIN=apps/agentprovision-cli/target/${{ matrix.target }}/release/agentprovision
          if [[ "${{ matrix.runner }}" == "windows-latest" ]]; then
            BIN="${BIN}.exe"
          fi
          test -x "$BIN" || { echo "binary not executable: $BIN"; ls -la "$(dirname "$BIN")"; exit 1; }
          "$BIN" --version
          "$BIN" --help | head -5

      - name: Report binary size
        shell: bash
        run: |
          BIN=apps/agentprovision-cli/target/${{ matrix.target }}/release/agentprovision
          [[ "${{ matrix.runner }}" == "windows-latest" ]] && BIN="${BIN}.exe"
          if [ -f "$BIN" ]; then
            echo "## ${{ matrix.target }} binary" >> $GITHUB_STEP_SUMMARY
            echo "Size: $(du -h "$BIN" | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentprovision-${{ matrix.target }}
          path: apps/agentprovision-cli/target/${{ matrix.target }}/release/agentprovision*
          if-no-files-found: error
          retention-days: 7

  aggregate:
    name: All targets built
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - run: echo "All 6 target triples built and uploaded."
