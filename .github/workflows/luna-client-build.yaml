name: Luna Client — Tauri Build

on:
  push:
    branches: [main, feat/luna-os-spatial-hud]
    paths:
      - 'apps/luna-client/**'
      - '.github/workflows/luna-client-build.yaml'
    tags:
      - 'luna-v*'
  workflow_dispatch:
    inputs:
      notary_timeout_seconds:
        # No default: leaving it empty lets the precedence chain resolve as
        # input -> vars.LUNA_NOTARY_TIMEOUT_SECONDS -> '180' (a non-empty
        # default here would always shadow the org/repo variable on dispatch).
        # Short by design: Apple's 2026 in-depth-analysis holds keep first-party
        # submissions "In Progress" for 24-72h+ (developer.apple.com/forums/thread/811968),
        # so a long in-build poll only burns runner time. The build submits,
        # grace-polls briefly, records the submission id, and ships unstapled
        # smoke; async finalize/publish is a separate concern (see plan).
        description: "Max seconds (60-7200) to grace-poll Apple notary before deferring to pending; signed smoke artifacts still ship, nothing publishes. Blank = repo var or 180 (short grace — Apple holds run 24-72h, polling longer in-build is futile)."
        required: false

permissions:
  contents: write

concurrency:
  group: luna-client-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    runs-on: self-hosted
    # First-time Apple notarization can sit in `notarytool --wait` for well
    # over 30 minutes. Keep the job bounded, but do not kill a valid signed
    # release build while Apple's queue is still processing it.
    timeout-minutes: 120
    env:
      LUNA_CHECKOUT_DIR: luna-build-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Use a per-run checkout path so actions/checkout never has to delete
          # the self-hosted runner's stale root workspace before cloning.
          path: ${{ env.LUNA_CHECKOUT_DIR }}
          # The self-hosted macOS runner can retain permission-owned cache
          # folders from other jobs. Avoid checkout's destructive clean path;
          # tracked files are still updated to the requested ref.
          clean: false

      - name: Clean Luna build outputs
        working-directory: ${{ env.LUNA_CHECKOUT_DIR }}
        run: |
          rm -rf apps/luna-client/dist
          rm -rf apps/luna-client/src-tauri/target/aarch64-apple-darwin/release/bundle
          rm -rf apps/luna-client/src-tauri/target/debug/bundle
          rm -f apps/luna-client/latest.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client
        run: npm ci

      - name: Install Rust (if needed)
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          rustc --version
          cargo --version

      - name: Install Tauri CLI
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          cargo install tauri-cli --version "^2" 2>/dev/null || true

      - name: Determine version
        id: version
        working-directory: ${{ env.LUNA_CHECKOUT_DIR }}
        env:
          REF_NAME: ${{ github.ref_name }}
          REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$REF" == refs/tags/luna-v* ]]; then
            VERSION="${REF_NAME#luna-v}"
          else
            BASE=$(python3 -c "import json; print(json.load(open('apps/luna-client/src-tauri/tauri.conf.json'))['version'])")
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            REMOTE_TAGS=$(git ls-remote --tags origin "refs/tags/luna-v${MAJOR}.${MINOR}.*" || true)
            EXISTING_FOR_SHA=$(printf '%s\n' "$REMOTE_TAGS" | awk -v sha="$GITHUB_SHA" '$1 == sha { sub("refs/tags/luna-v", "", $2); print $2; exit }')
            if [ -n "$EXISTING_FOR_SHA" ]; then
              VERSION="$EXISTING_FOR_SHA"
            else
              LATEST_TAGS=$(gh release list --limit 200 --json tagName,publishedAt \
                --jq ".[] | select(.tagName | test(\"^luna-v${MAJOR}\\\\.${MINOR}\\\\.[0-9]+$\")) | .tagName" \
              )
              LATEST_TAG=$(printf '%s\n' "$LATEST_TAGS" | head -1)
              LATEST_PATCH=$(printf '%s\n' "$LATEST_TAG" \
                | sed -E "s/^luna-v${MAJOR}\\.${MINOR}\\.([0-9]+)$/\\1/")
              PATCH=$(( ${LATEST_PATCH:-0} + 1 ))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
              while true; do
                TAG_SHA=$(printf '%s\n' "$REMOTE_TAGS" | awk -v tag="refs/tags/luna-v${VERSION}" '$2 == tag { print $1; exit }')
                if [ -z "$TAG_SHA" ] || [ "$TAG_SHA" = "$GITHUB_SHA" ]; then
                  break
                fi
                PATCH=$(( PATCH + 1 ))
                VERSION="${MAJOR}.${MINOR}.${PATCH}"
              done
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

          # Patch tauri.conf.json so the built DMG has the correct version name
          python3 -c "import json; d=json.load(open('apps/luna-client/src-tauri/tauri.conf.json')); d['version']='$VERSION'; json.dump(d, open('apps/luna-client/src-tauri/tauri.conf.json', 'w'), indent=2)"

      - name: Determine signing mode
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          missing=0
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            TAURI_SIGNING_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then
              echo "::notice::$name is not configured; unsigned development mode remains enabled"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Building signed/notarized Luna release."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Signing secrets are incomplete; building unsigned Luna development DMG."
          fi

      - name: Install Apple Developer ID certificate chain
        if: steps.signing.outputs.signed == 'true'
        run: |
          CHAIN_DIR="$(mktemp -d)"
          trap 'rm -rf "$CHAIN_DIR"' EXIT
          curl -fsSL \
            https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer \
            -o "$CHAIN_DIR/DeveloperIDG2CA.cer"

          LOGIN_KEYCHAIN="$HOME/Library/Keychains/login.keychain-db"
          security import "$CHAIN_DIR/DeveloperIDG2CA.cer" \
            -k "$LOGIN_KEYCHAIN" >/dev/null 2>&1 || true

          security find-certificate \
            -c "Developer ID Certification Authority" \
            "$LOGIN_KEYCHAIN" >/dev/null

      - name: Build Tauri (macOS ARM64, sign only)
        working-directory: ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client
        env:
          VITE_API_BASE_URL: ${{ secrets.LUNA_API_URL || 'https://agentprovision.com' }}
          # Signing credentials ONLY. Notarization is intentionally withheld from
          # Tauri: APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID and APPLE_API_* are not
          # exported, so tauri-bundler signs the app+dylib but skips notarization
          # (notarize_auth -> MissingCredentials -> warn + continue). Apple
          # notarization runs as an explicit, observable, queue-decoupled step
          # below, which keeps the app-specific password off the long-lived
          # `notarytool submit --wait` process arguments.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            cargo tauri build --target aarch64-apple-darwin
          else
            cargo tauri build --target aarch64-apple-darwin --no-sign
          fi

      - name: Notarize + finalize (explicit, queue-decoupled)
        id: notarize
        if: steps.signing.outputs.signed == 'true'
        working-directory: ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client
        env:
          # App-specific-password fallback (used to seed a keychain profile once).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Developer ID identity (re-imported here to sign the rebuilt DMG).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # Preferred password-free auth (optional). Add these secrets to retire
          # the app-specific-password path entirely:
          #   APPLE_API_KEY     = base64 of the AuthKey_<id>.p8
          #   APPLE_API_KEY_ID  = the 10-char key id
          #   APPLE_API_ISSUER  = the issuer UUID
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          NOTARY_TIMEOUT_SECONDS: ${{ github.event.inputs.notary_timeout_seconds || vars.LUNA_NOTARY_TIMEOUT_SECONDS || '180' }}
        run: |
          set -eo pipefail

          # SECURITY NOTE (single-tenant self-hosted runner): two secrets transit
          # a process argument briefly here -- `security import -P` (Developer ID
          # cert passphrase) and, on the fallback path, `notarytool
          # store-credentials --password` (app-specific password) -- plus the
          # throwaway random keychain password on `set-key-partition-list -k`.
          # None has a non-argv input mode, all are short-lived, and none rides
          # the long notary poll. On macOS `ps -ax -o command` exposes any user's
          # argv (no hidepid), so this assumes a single-tenant runner. Adding the
          # App Store Connect API key secrets removes the store-credentials
          # exposure (the unavoidable cert-import one remains). Notarization runs
          # on EVERY signed build (incl. branch/dispatch) on purpose, to produce
          # validated smoke artifacts; publication is gated separately below.

          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Luna.app"
          test -d "$APP_PATH"

          # Validate the poll budget up front: a non-numeric or out-of-range value
          # would otherwise silently degrade to instant-pending or an unbounded
          # loop under bash arithmetic.
          case "$NOTARY_TIMEOUT_SECONDS" in
            ''|*[!0-9]*)
              echo "::error::NOTARY_TIMEOUT_SECONDS must be a positive integer (seconds), got '$NOTARY_TIMEOUT_SECONDS'"; exit 1 ;;
          esac
          if [ "$NOTARY_TIMEOUT_SECONDS" -lt 60 ] || [ "$NOTARY_TIMEOUT_SECONDS" -gt 7200 ]; then
            echo "::error::NOTARY_TIMEOUT_SECONDS out of range [60,7200]: '$NOTARY_TIMEOUT_SECONDS'"; exit 1
          fi

          # Resolve the Tauri-built DMG (exactly one expected; a stale leftover on
          # the persistent runner would make a bare glob ambiguous).
          set -- src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg
          if [ "$#" -ne 1 ] || [ ! -f "$1" ]; then
            echo "::error::expected exactly one Luna_*.dmg, found $#: $*"; exit 1
          fi
          DMG_PATH="$1"

          # Disposable, run-scoped keychain: holds the Developer ID identity for
          # the DMG re-sign and (fallback path) the notary keychain profile. Kept
          # OFF the global search list (every tool references it via --keychain) so
          # concurrent jobs and the login keychain are undisturbed; chain-building
          # still finds the Developer ID G2 intermediate in the login keychain.
          # Deleted by the always() "Clean up signing keychain" step.
          RUN_TAG="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          KEYCHAIN="$RUNNER_TEMP/luna-ci-${RUN_TAG}.keychain-db"
          KEYCHAIN_PW="$(openssl rand -hex 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "keychain=$KEYCHAIN" >> "$GITHUB_OUTPUT"

          CERT_P12="$RUNNER_TEMP/luna-developer-id-${RUN_TAG}.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_P12"
          security import "$CERT_P12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign >/dev/null
          rm -f "$CERT_P12"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null 2>&1
          SIGN_ID="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$SIGN_ID" ]; then
            echo "::error::No Developer ID Application identity found in CI keychain"
            exit 1
          fi

          # Notary auth: prefer App Store Connect API key (no password anywhere);
          # else seed a keychain profile from the app-specific password. The
          # password reaches a process argument ONLY in store-credentials (a few
          # seconds), never during submit/info/log/poll.
          AUTH=()
          if [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_API_ISSUER" ]; then
            P8_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}-${RUN_TAG}.p8"
            printf '%s' "$APPLE_API_KEY" | base64 --decode > "$P8_PATH"
            AUTH=(--key "$P8_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER")
            echo "Notary auth: App Store Connect API key"
          else
            echo "::notice::Notary auth via app-specific-password keychain profile. Add APPLE_API_KEY/APPLE_API_KEY_ID/APPLE_API_ISSUER to remove the brief store-credentials password exposure."
            xcrun notarytool store-credentials "luna-notary-ci" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" \
              --keychain "$KEYCHAIN" >/dev/null
            AUTH=(--keychain-profile "luna-notary-ci" --keychain "$KEYCHAIN")
          fi

          # Submit <archive>, bounded-poll, staple <staple_target> on Accept.
          # Returns 0=accepted, 1=pending(timeout), 2=failed. Never uses --wait,
          # so a backlogged Apple queue cannot block the build.
          LAST_SUBMISSION_ID=""
          notarize_artifact() {
            artifact="$1"; staple_target="$2"; label="$(basename "$artifact")"
            if ! submit_json="$(xcrun notarytool submit "$artifact" "${AUTH[@]}" --no-wait --output-format json)"; then
              echo "::error::notarytool submit failed for $label: $(printf '%s' "$submit_json" | head -c 500)"
              return 2
            fi
            sid="$(printf '%s' "$submit_json" | jq -r '.id // empty' 2>/dev/null || true)"
            if [ -z "$sid" ]; then
              echo "::error::notarytool submit returned no id for $label: $(printf '%s' "$submit_json" | head -c 500)"
              return 2
            fi
            LAST_SUBMISSION_ID="$sid"
            echo "submission id ($label): $sid"
            deadline=$(( $(date +%s) + NOTARY_TIMEOUT_SECONDS ))
            while :; do
              info="$(xcrun notarytool info "$sid" "${AUTH[@]}" --output-format json 2>/dev/null || echo '{}')"
              status="$(printf '%s' "$info" | jq -r '.status // "Unknown"' 2>/dev/null || echo Unknown)"
              echo "notary status ($label): $status"
              case "$status" in
                Accepted)
                  if xcrun stapler staple "$staple_target"; then return 0; fi
                  echo "::error::stapler staple failed for $staple_target"; return 2 ;;
                Invalid|Rejected)
                  echo "::error::Notarization $status for $sid ($label)"
                  xcrun notarytool log "$sid" "${AUTH[@]}" || true
                  return 2 ;;
              esac
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "::warning::Apple notary still '$status' after ${NOTARY_TIMEOUT_SECONDS}s ($sid, $label). Shipping signed un-stapled smoke artifacts (their DMG bytes + sha256 differ from the eventual release); re-run after the queue drains to finalize/publish."
                return 1
              fi
              sleep 60
            done
          }

          # 1) Notarize + staple the app bundle (Apple-recommended ditto archive).
          ditto -c -k --keepParent --sequesterRsrc "$APP_PATH" notarize-upload.zip
          rc=0; notarize_artifact notarize-upload.zip "$APP_PATH" || rc=$?
          rm -f notarize-upload.zip
          echo "submission_id=$LAST_SUBMISSION_ID" >> "$GITHUB_OUTPUT"
          if [ "$rc" -eq 2 ]; then exit 1; fi
          if [ "$rc" -eq 1 ]; then echo "notarized=pending" >> "$GITHUB_OUTPUT"; exit 0; fi

          # 2) Rebuild the DMG from the now-stapled app so a dragged-out
          #    /Applications/Luna.app carries the ticket (offline stapler validate
          #    passes). The updater Luna.app.tar.gz is left untouched: same cdhash
          #    -> notarized online once Accepted, and its .sig stays valid.
          STAGE="$RUNNER_TEMP/luna-dmg-root-${RUN_TAG}"
          rm -rf "$STAGE"; mkdir -p "$STAGE"
          ditto "$APP_PATH" "$STAGE/Luna.app"
          ln -s /Applications "$STAGE/Applications"
          xcrun stapler validate "$STAGE/Luna.app"
          rm -f "$DMG_PATH"
          hdiutil create -volname "Luna" -srcfolder "$STAGE" -fs HFS+ -format UDZO -ov "$DMG_PATH"
          codesign --force --sign "$SIGN_ID" --keychain "$KEYCHAIN" "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"
          rm -rf "$STAGE"

          # 3) Notarize + staple the DMG itself so a downloaded DMG opens without
          #    a Gatekeeper prompt (the container carries its own cdhash).
          rc=0; notarize_artifact "$DMG_PATH" "$DMG_PATH" || rc=$?
          if [ "$rc" -eq 2 ]; then exit 1; fi
          if [ "$rc" -eq 1 ]; then echo "notarized=pending" >> "$GITHUB_OUTPUT"; exit 0; fi

          echo "notarized=accepted" >> "$GITHUB_OUTPUT"

      - name: Verify signing, notarization, and stapled DMG
        if: steps.signing.outputs.signed == 'true' && steps.notarize.outputs.notarized == 'accepted'
        working-directory: ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client
        run: |
          set -eo pipefail
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Luna.app"
          set -- src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg
          DMG_PATH="$1"
          test -f "$DMG_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2> codesign.txt
          cat codesign.txt
          grep -q "Authority=Developer ID Application" codesign.txt
          xcrun stapler validate "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"
          # Load-bearing check: assert offline Gatekeeper on the copy users
          # actually receive -- the app AFTER the DMG (hdiutil HFS+) round-trip,
          # not the build-tree bundle. --ignore-cache/--no-cache avoid a stale
          # cached verdict on the persistent runner.
          MNT="$(mktemp -d)"
          hdiutil attach -nobrowse -mountpoint "$MNT" "$DMG_PATH"
          ( xcrun stapler validate "$MNT/Luna.app" \
            && spctl -a -vv -t exec --ignore-cache --no-cache "$MNT/Luna.app" ) \
            || { hdiutil detach "$MNT" || true; exit 1; }
          hdiutil detach "$MNT" || true

      - name: Generate DMG checksum
        working-directory: ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client
        run: |
          DMG_PATH=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg)
          DMG_DIR=$(dirname "$DMG_PATH")
          DMG_NAME=$(basename "$DMG_PATH")
          (cd "$DMG_DIR" && shasum -a 256 "$DMG_NAME") > "${DMG_PATH}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luna-macos-arm64
          path: |
            ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Luna.app
            ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg
            ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg.sha256
            ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Luna.app.tar.gz
            ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Luna.app.tar.gz.sig
          retention-days: 30

      - name: Generate updater manifest
        if: steps.signing.outputs.signed == 'true' && steps.notarize.outputs.notarized == 'accepted'
        working-directory: ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg)
          DMG_SHA_PATH="${DMG_PATH}.sha256"
          UPDATER_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Luna.app.tar.gz"
          UPDATER_SIG_PATH="${UPDATER_PATH}.sig"
          UPDATER_NAME=$(basename "$UPDATER_PATH")
          TAG="luna-v${VERSION}"

          test -f "$DMG_PATH"
          test -f "$UPDATER_PATH"
          test -f "$UPDATER_SIG_PATH"
          SIG=$(cat "$UPDATER_SIG_PATH" | tr -d '\n')
          if [ -z "$SIG" ]; then
            echo "::error::Tauri updater signature artifact is empty"
            exit 1
          fi
          test -f "$DMG_SHA_PATH"

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "Luna $VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/${UPDATER_NAME}"
              }
            }
          }
          EOF
          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("latest.json").read_text())
          platform = manifest["platforms"]["darwin-aarch64"]
          assert platform["signature"], "missing updater signature"
          assert "nomad3/agentprovision-agents" in platform["url"], platform["url"]
          assert platform["url"].endswith("/Luna.app.tar.gz"), platform["url"]
          PY

      - name: Create or update GitHub Release
        # Signed releases publish only when notarization is Accepted (stapled
        # DMG + valid updater). Unsigned development builds keep their prior
        # prerelease path. A signed build with notarization still 'pending' (Apple
        # backlog) ships smoke artifacts but does NOT publish a release.
        if: (startsWith(github.ref, 'refs/tags/luna-v') || github.ref == 'refs/heads/main') && (steps.notarize.outputs.notarized == 'accepted' || steps.signing.outputs.signed != 'true')
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="luna-v${VERSION}"
          DMG_PATH=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg)
          DMG_SHA_PATH="${DMG_PATH}.sha256"
          UPDATER_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Luna.app.tar.gz"
          UPDATER_SIG_PATH="${UPDATER_PATH}.sig"
          ASSETS=("$DMG_PATH" "$DMG_SHA_PATH")
          RELEASE_NOTES="Luna $VERSION unsigned development build."
          RELEASE_FLAGS=(--prerelease --latest=false)
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            test -f "$UPDATER_PATH"
            test -f "$UPDATER_SIG_PATH"
            test -f latest.json
            ASSETS+=("$UPDATER_PATH" "$UPDATER_SIG_PATH" latest.json)
            RELEASE_NOTES="Luna $VERSION signed and notarized release."
            RELEASE_FLAGS=(--latest)
          fi

          # Create tag if it doesn't exist
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true
          REMOTE_TAG_SHA=$(git ls-remote --tags origin "refs/tags/${TAG}" | awk '{print $1; exit}')
          BUILD_SHA=$(git rev-parse HEAD)
          if [ "$REMOTE_TAG_SHA" != "$BUILD_SHA" ]; then
            echo "::error::${TAG} points at ${REMOTE_TAG_SHA:-missing}, expected ${BUILD_SHA}"
            exit 1
          fi

          release_exists() {
            gh release view "$TAG" >/dev/null 2>&1
          }

          upload_assets() {
            for attempt in 1 2 3; do
              if gh release upload "$TAG" "${ASSETS[@]}" --clobber; then
                return 0
              fi
              sleep $((attempt * 10))
            done
            return 1
          }

          create_release() {
            gh release create "$TAG" \
              "${ASSETS[@]}" \
              --title "Luna $VERSION" \
              --notes "$RELEASE_NOTES" \
              --verify-tag \
              "${RELEASE_FLAGS[@]}"
          }

          # GitHub's release API can time out after creating the release
          # server-side. Treat create/upload as idempotent: after any failed
          # create, poll for the release before retrying or uploading assets.
          if release_exists; then
            if upload_assets; then
              exit 0
            fi
            echo "::error::${TAG} exists, but asset upload failed after retries"
            exit 1
          fi

          for attempt in 1 2 3; do
            if create_release; then
              if upload_assets; then
                exit 0
              fi
              echo "::error::Created ${TAG}, but asset upload failed after retries"
              exit 1
            fi
            sleep $((attempt * 10))
            if release_exists; then
              if upload_assets; then
                exit 0
              fi
              echo "::error::${TAG} appeared after create failure, but asset upload failed after retries"
              exit 1
            fi
          done

          echo "::error::Failed to create or update ${TAG} after retries"
          exit 1

      - name: Publish stable Luna updater manifest
        if: steps.signing.outputs.signed == 'true' && steps.notarize.outputs.notarized == 'accepted' && (startsWith(github.ref, 'refs/tags/luna-v') || github.ref == 'refs/heads/main')
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: ${{ env.LUNA_CHECKOUT_DIR }}/apps/luna-client
        run: |
          STABLE_TAG="luna-latest"
          git tag -f "$STABLE_TAG"
          git push origin "refs/tags/$STABLE_TAG" --force

          if gh release view "$STABLE_TAG" >/dev/null 2>&1; then
            gh release upload "$STABLE_TAG" latest.json --clobber
          else
            gh release create "$STABLE_TAG" \
              latest.json \
              --title "Luna latest updater manifest" \
              --notes "Stable updater manifest for the latest Luna desktop release." \
              --latest=false \
              --verify-tag
          fi

      - name: Clean up signing keychain
        if: always()
        env:
          NOTARY_KEYCHAIN: ${{ steps.notarize.outputs.keychain }}
        run: |
          RUN_TAG="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          if [ -n "$NOTARY_KEYCHAIN" ]; then
            security delete-keychain "$NOTARY_KEYCHAIN" 2>/dev/null || true
          fi
          rm -f "$RUNNER_TEMP"/AuthKey_*-"${RUN_TAG}".p8 "$RUNNER_TEMP"/luna-developer-id-"${RUN_TAG}".p12 2>/dev/null || true
          rm -rf "$RUNNER_TEMP"/luna-dmg-root-"${RUN_TAG}" 2>/dev/null || true

      - name: Remove isolated checkout
        if: always()
        run: rm -rf "${LUNA_CHECKOUT_DIR}" || true
