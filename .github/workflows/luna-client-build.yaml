name: Luna Client — Tauri Build

on:
  push:
    branches: [main, feat/luna-os-spatial-hud]
    paths:
      - 'apps/luna-client/**'
      - '.github/workflows/luna-client-build.yaml'
    tags:
      - 'luna-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: apps/luna-client
        run: npm ci

      - name: Install Rust (if needed)
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          if ! command -v cargo &> /dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
          rustc --version
          cargo --version

      - name: Install Tauri CLI
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          cargo install tauri-cli --version "^2" 2>/dev/null || true

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/luna-v* ]]; then
            VERSION=$(echo "${{ github.ref_name }}" | sed 's/luna-v//')
          else
            # Auto-increment: MAJOR.MINOR from tauri.conf.json, PATCH = commits since start
            BASE=$(python3 -c "import json; print(json.load(open('apps/luna-client/src-tauri/tauri.conf.json'))['version'])")
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(git rev-list HEAD --count -- apps/luna-client/)
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          
          # Patch tauri.conf.json so the built DMG has the correct version name
          python3 -c "import json; d=json.load(open('apps/luna-client/src-tauri/tauri.conf.json')); d['version']='$VERSION'; json.dump(d, open('apps/luna-client/src-tauri/tauri.conf.json', 'w'), indent=2)"

      - name: Build Tauri (macOS ARM64)
        working-directory: apps/luna-client
        env:
          VITE_API_BASE_URL: ${{ secrets.LUNA_API_URL || 'https://agentprovision.com' }}
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          cargo tauri build --target aarch64-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luna-macos-arm64
          path: |
            apps/luna-client/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Luna.app
            apps/luna-client/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg
          retention-days: 30

      - name: Generate updater manifest
        if: startsWith(github.ref, 'refs/tags/luna-v') || github.ref == 'refs/heads/main'
        working-directory: apps/luna-client
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg)
          DMG_NAME=$(basename "$DMG_PATH")
          TAG="luna-v${VERSION}"

          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for Luna updater releases"
            exit 1
          fi
          source "$HOME/.cargo/env" 2>/dev/null || true
          SIG=$(cargo tauri signer sign "$DMG_PATH" --private-key "$TAURI_SIGNING_PRIVATE_KEY" 2>/dev/null | tail -1 || echo "")
          if [ -z "$SIG" ]; then
            echo "::error::cargo tauri signer produced an empty updater signature"
            exit 1
          fi

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "Luna $VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/${DMG_NAME}"
              }
            }
          }
          EOF

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/luna-v') || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: apps/luna-client
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="luna-v${VERSION}"
          DMG_PATH=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Luna_*.dmg)

          # Create tag if it doesn't exist
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true

          # Create or Update release with ALL assets in one shot
          # This is more reliable than separate create and upload calls
          gh release create "$TAG" \
            "$DMG_PATH" \
            latest.json \
            --title "Luna $VERSION" \
            --generate-notes \
            --latest \
            --verify-tag \
            || gh release upload "$TAG" "$DMG_PATH" latest.json --clobber

      - name: Publish stable Luna updater manifest
        if: startsWith(github.ref, 'refs/tags/luna-v') || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: apps/luna-client
        run: |
          STABLE_TAG="luna-latest"
          git tag -f "$STABLE_TAG"
          git push origin "refs/tags/$STABLE_TAG" --force

          if gh release view "$STABLE_TAG" >/dev/null 2>&1; then
            gh release upload "$STABLE_TAG" latest.json --clobber
          else
            gh release create "$STABLE_TAG" \
              latest.json \
              --title "Luna latest updater manifest" \
              --notes "Stable updater manifest for the latest Luna desktop release." \
              --latest=false \
              --verify-tag
          fi
