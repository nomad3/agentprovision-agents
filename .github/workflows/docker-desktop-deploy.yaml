name: Docker Desktop Deployment

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'  # Phase 1.5: rebuild on shared cli_orchestrator changes
      - 'scripts/migrate_compose_workspaces_volume.sh'
      - 'docker-compose.yml'
      - '.github/workflows/docker-desktop-deploy.yaml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - rebuild-all

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    # Cold-cache rebuild-all (8 services, Rust embedding-service +
    # memory-core, Node web bundle, Python wheels) needs ~70-90 min on
    # the single Mac-VM self-hosted runner. The previous 60-min ceiling
    # cancelled the cli-v0.7.4 cycle mid-build; 120 gives Rust release
    # builds enough room without making the failure mode "wait forever
    # on a wedged process" — actual hangs still surface within a
    # reasonable window.
    timeout-minutes: 120
    env:
      # Never bind-mount live Docker services from the GitHub Actions
      # runner checkout. The runner workspace is cleaned/reset by
      # actions/checkout and other workflows; when compose runs there,
      # api/worker/cloudflared containers can lose their source tree or
      # secrets mid-deploy. Sync each checkout into this stable directory
      # and run every compose command from there instead.
      DEPLOY_DIR: /Users/nomade/.agentprovision/deploy/agentprovision-agents
      DEPLOY_MIN_HOST_FREE_GB: "12"
      DEPLOY_MIN_DOCKER_FREE_GB: "8"

    steps:
      # NOTE: previously this step stopped api / orchestration-worker /
      # code-worker before checkout to release their bind-mounts so the
      # runner's default `clean: true` could rmdir the phantom directories
      # at `apps/{api,code-worker}/cli_orchestrator`. That gave every
      # deploy 3–15 minutes of api downtime for the entire build.
      #
      # We now use `clean: false` + explicit `git clean -fd -e <paths>`
      # in the "Reset working tree" step below, which skips the
      # bind-mount paths instead of trying (and failing) to rmdir them.
      # Containers keep running through the build; `compose up -d
      # --force-recreate $SERVICES` later swaps images in 5–10 s.
      #
      # Phantom-dir cleanup is now done after checkout in the reset step.

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # `clean: true` (default) calls rm -rf on the working tree before
          # syncing. Phase 1.5 introduced docker-compose bind-mounts targeted
          # at `apps/api/cli_orchestrator` + `apps/code-worker/cli_orchestrator`
          # — Docker creates phantom (empty, root-owned) target directories
          # at those paths on the host that the runner can't rmdir while
          # the containers are running, and stopping the containers in
          # pre-checkout is impossible (no repo on disk yet). Switch to
          # clean: false and do an explicit git-clean below that excludes
          # only the bind-mount phantoms.
          clean: false
          # `fetch-depth: 0` so the change-detection step below can resolve
          # `HEAD~1` for `git diff`. Default depth is 1 (shallow), which
          # makes `HEAD~1` unknown — the diff silently fails, the fallback
          # `echo "apps/api"` fires, and the grep against `"apps/api/"`
          # (trailing slash) doesn't match → SERVICES comes out empty
          # and `compose up -d` runs without `--build`, leaving images
          # stale. This bit the 2026-05-14 #471 deploy: web bundle was
          # never rebuilt despite the squash-merge touching apps/web/*.
          fetch-depth: 0

      - name: Reset working tree (skipping Docker bind-mount phantoms)
        run: |
          # Equivalent to clean: true but with explicit excludes for the
          # Phase 1.5 docker-compose bind-mount targets. Without these
          # excludes the runner fails with EACCES on rmdir.
          git reset --hard HEAD
          git clean -fd \
            -e apps/api/cli_orchestrator \
            -e apps/code-worker/cli_orchestrator \
            -e apps/api/.env \
            -e .env \
            -e cloudflared/credentials.json \
            -e cloudflared/cert.pem

      - name: Sync checkout to stable compose directory
        run: |
          set -euo pipefail
          mkdir -p "$DEPLOY_DIR"
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '**/node_modules/' \
            --exclude '**/target/' \
            --exclude '**/dist/' \
            --exclude '**/build/' \
            --exclude '**/__pycache__/' \
            --exclude '**/.pytest_cache/' \
            --exclude '**/.ruff_cache/' \
            --exclude '**/.venv/' \
            --exclude '.env' \
            --exclude 'PRODUCTION.env' \
            --exclude 'apps/api/.env' \
            --exclude 'cloudflared/credentials.json' \
            --exclude 'cloudflared/cert.pem' \
            ./ "$DEPLOY_DIR"/
          echo "Deploy checkout synced to $DEPLOY_DIR"

      - name: Load runtime secrets from $HOME
        run: |
          # Secrets live at $HOME/Documents/GitHub/agentprovision-agents/
          # with 0600 perms. F2 keychain migration was attempted across
          # PRs #712, #718, #719, #720, #721, #723, #724 but abandoned —
          # see docs/plans/2026-05-25-f2-keychain-wontfix-decision.md.
          # Login keychain unlock is per-security-session, which the
          # runner's launchd-spawned Mach context cannot inherit from
          # the operator's GUI session without storing the login
          # password somewhere readable (chicken-and-egg).
          #
          # Entry format: "dst" if src_rel==dst, or "dst:src_rel" if
          # different. ${entry%%:*} returns dst (or full string when no
          # `:`). ${entry##*:} returns src_rel (or full string when no
          # `:`). The only entry with src!=dst is .env (src is
          # PRODUCTION.env in the home repo).
          for entry in \
              "cloudflared/credentials.json" \
              "cloudflared/cert.pem" \
              "apps/api/.env" \
              ".env:PRODUCTION.env"; do
            dst="${entry%%:*}"
            src_rel="${entry##*:}"
            src="$HOME/Documents/GitHub/agentprovision-agents/$src_rel"
            mkdir -p "$DEPLOY_DIR/$(dirname "$dst")"
            cp "$src" "$DEPLOY_DIR/$dst"
            chmod 600 "$DEPLOY_DIR/$dst"
            echo "[$DEPLOY_DIR/$dst]  ←  $src"
          done

      - name: Detect changed services
        id: changes
        run: |
          # Diff against the prior commit. fetch-depth: 0 in the checkout
          # above ensures HEAD~1 resolves. The fallback string ends in a
          # slash so the `grep -q "apps/api/"` pattern matches — a prior
          # version used "apps/api" (no slash) and silently emitted an
          # empty SERVICES on diff failure.
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "apps/api/")
          BUILD_SERVICES=""
          RECREATE_SERVICES=""

          # Bind-mounted services can pick up source-only changes by syncing
          # DEPLOY_DIR and recreating the container. Reserve image rebuilds for
          # dependency / Dockerfile / generated-proto inputs that actually change
          # the image filesystem. This keeps one-PR deploys from hitting the
          # Docker-VM build-space guard when no image build is needed.
          echo "$CHANGED" | grep -q "apps/api/" && RECREATE_SERVICES="$RECREATE_SERVICES api orchestration-worker"
          echo "$CHANGED" | grep -Eq '^apps/api/(Dockerfile|requirements\.(in|lock)|proto/|scripts/gen_proto\.sh)' && BUILD_SERVICES="$BUILD_SERVICES api orchestration-worker"

          echo "$CHANGED" | grep -q "apps/code-worker/" && RECREATE_SERVICES="$RECREATE_SERVICES code-worker"
          echo "$CHANGED" | grep -Eq '^apps/code-worker/(Dockerfile|package(-lock)?\.json|requirements[^/]*\.txt)' && BUILD_SERVICES="$BUILD_SERVICES code-worker"

          echo "$CHANGED" | grep -q "apps/web/" && BUILD_SERVICES="$BUILD_SERVICES web"
          echo "$CHANGED" | grep -q "apps/embedding-service/" && BUILD_SERVICES="$BUILD_SERVICES embedding-service"
          echo "$CHANGED" | grep -q "apps/memory-core/" && BUILD_SERVICES="$BUILD_SERVICES memory-core"
          echo "$CHANGED" | grep -q "apps/mcp-server/" && BUILD_SERVICES="$BUILD_SERVICES mcp-tools"
          echo "$CHANGED" | grep -q "apps/luna-client/" && BUILD_SERVICES="$BUILD_SERVICES luna-client"

          # Phase 1.5: cli_orchestrator is bind-mounted into api,
          # orchestration-worker, and code-worker, so source changes need
          # recreation, not an image rebuild.
          echo "$CHANGED" | grep -q "packages/cli_orchestrator/" && RECREATE_SERVICES="$RECREATE_SERVICES api orchestration-worker code-worker"

          # Compose-only changes can affect environment, volumes, healthchecks,
          # or commands for several services. Recreate the application layer
          # without forcing a build; leave stateful dependencies alone. If the
          # compose diff changes build metadata itself, fall back to rebuilding
          # the application images because the image contract may have changed.
          if echo "$CHANGED" | grep -q "^docker-compose.yml$"; then
            RECREATE_SERVICES="$RECREATE_SERVICES api web code-worker orchestration-worker embedding-service memory-core mcp-tools luna-client cloudflared"
            COMPOSE_DIFF="$(git diff -U0 HEAD~1 HEAD -- docker-compose.yml 2>/dev/null || true)"
            if echo "$COMPOSE_DIFF" | grep -Eq '^[+-][[:space:]]*(build:|context:|dockerfile:|args:)'; then
              BUILD_SERVICES="$BUILD_SERVICES api web code-worker orchestration-worker embedding-service memory-core mcp-tools luna-client"
            fi
          fi
          
          # Two cases for an empty detected service set:
          #   (a) explicit `rebuild-all` from workflow_dispatch → build all.
          #   (b) push event with NO `apps/**/` match (workflow-file
          #       only, docs-only, etc.) → nothing to build. The
          #       previous logic collapsed both into rebuild-all,
          #       which made every workflow-file tweak run a cold
          #       rebuild that timed out at 60 min (cli-v0.7.4 cycle
          #       2026-05-13). Skip-build on (b) instead, so the
          #       deploy fast-paths through `compose up -d` +
          #       migrations against the existing images.
          if [ "${{ github.event.inputs.action }}" = "rebuild-all" ]; then
            BUILD_SERVICES="api web code-worker orchestration-worker embedding-service memory-core mcp-tools luna-client"
          elif [ "${{ github.event.inputs.action }}" = "restart" ]; then
            RECREATE_SERVICES="api web code-worker orchestration-worker embedding-service memory-core mcp-tools luna-client cloudflared"
          fi

          # Rebuilt services must also be recreated so containers pick up the
          # new image. Dedup both lists.
          RECREATE_SERVICES="$RECREATE_SERVICES $BUILD_SERVICES"
          BUILD_SERVICES="$(tr ' ' '\n' <<< "$BUILD_SERVICES" | sed '/^$/d' | sort -u | tr '\n' ' ')"
          RECREATE_SERVICES="$(tr ' ' '\n' <<< "$RECREATE_SERVICES" | sed '/^$/d' | sort -u | tr '\n' ' ')"
          echo "build_services=$BUILD_SERVICES" >> "$GITHUB_OUTPUT"
          echo "recreate_services=$RECREATE_SERVICES" >> "$GITHUB_OUTPUT"
          if [ -z "$BUILD_SERVICES" ]; then
            echo "No image build required."
          else
            echo "Services to build: $BUILD_SERVICES"
          fi
          if [ -z "$RECREATE_SERVICES" ]; then
            echo "No service recreate required."
          else
            echo "Services to recreate: $RECREATE_SERVICES"
          fi

      # ── Reclaim disk before build ──
      # Today's deploy storm (2026-05-18) was caused by the Docker VM
      # filling between deploys: cold builds export multi-GB images and
      # leave dangling parents behind, and stale buildx cache layers
      # pile up across runs. The 4 AM cron prune (docker-cleanup.yaml)
      # is too rare; the sentinel runbook is reactive. This tiny
      # pre-build step makes every deploy start at maximum free space.
      #
      # Runs only when BUILD_SERVICES is non-empty (i.e. an actual image
      # build is about to happen) — bind-mounted source/config deploys
      # don't churn prune or hit the Docker-VM build-space guard.
      #
      # Flag rationale:
      #   * `image prune -f`        → dangling images only (cheap, frees real bytes,
      #                               never touches tagged-and-in-use images).
      #   * `buildx prune --until=24h -f`
      #                             → drop buildx cache OLDER than 24h. Critical:
      #                               this preserves the cache for the build that's
      #                               about to run (cache produced minutes ago is
      #                               always < 24h). `buildx prune -af` would
      #                               nuke the warm cache and force a cold rebuild.
      #   * `container prune -f`    → stopped containers only. None expected on
      #                               a healthy runner, but cheap insurance.
      #
      # NEVER do here:
      #   * `docker volume prune`   → would delete db_data, hf_cache,
      #                               workspaces, redis AOF, temporal state.
      #   * `docker system prune -a -f`
      #                             → would delete in-use tagged images
      #                               (anything not currently bound to a
      #                               running container is fair game).
      #   * `docker buildx prune -af`
      #                             → discards ALL cache including warm
      #                               layers, defeating the point.
      #
      # `set +e` is intentional: a single failing prune subcommand
      # should never fail the deploy — the build is what matters.
      - name: Reclaim disk before build
        if: steps.changes.outputs.build_services != ''
        run: |
          set +e
          echo "=== Before prune ==="
          docker exec agentprovision-agents-api-1 df -h / 2>/dev/null | tail -1 || true
          docker system df 2>&1 | head -5
          # Drop dangling images first (cheap, frees real bytes)
          docker image prune -f 2>&1 | tail -1
          # Drop buildx cache older than 24h (safe — recent builds keep their caches)
          docker buildx prune --filter "until=24h" -f 2>&1 | tail -1
          # Drop stopped containers (none expected, but cheap)
          docker container prune -f 2>&1 | tail -1
          echo "=== After prune ==="
          docker system df 2>&1 | head -5
          docker exec agentprovision-agents-api-1 df -h / 2>/dev/null | tail -1 || true
          # NEVER `docker volume prune` here — would delete db_data, hf_cache etc.
          # NEVER `docker system prune -a -f` here — would delete in-use images.
          # NEVER `docker buildx prune -af` here — would discard ALL cache,
          # including the cache for the build that's about to run.
          set -e

          HOST_FREE_KB="$(df -Pk /System/Volumes/Data | awk 'NR == 2 { print $4 }')"
          HOST_MIN_KB=$((DEPLOY_MIN_HOST_FREE_GB * 1024 * 1024))
          if [ -z "$HOST_FREE_KB" ] || [ "$HOST_FREE_KB" -lt "$HOST_MIN_KB" ]; then
            echo "::error::Refusing to build with less than ${DEPLOY_MIN_HOST_FREE_GB}GiB free on /System/Volumes/Data after safe prune; found $(( ${HOST_FREE_KB:-0} / 1024 / 1024 ))GiB. Free disk before rebuilding services so deploy does not starve Docker/cloudflared."
            exit 1
          fi

          DOCKER_FREE_KB="$(docker exec agentprovision-agents-api-1 df -Pk / 2>/dev/null | awk 'NR == 2 { print $4 }')"
          DOCKER_MIN_KB=$((DEPLOY_MIN_DOCKER_FREE_GB * 1024 * 1024))
          if [ -z "$DOCKER_FREE_KB" ] || [ "$DOCKER_FREE_KB" -lt "$DOCKER_MIN_KB" ]; then
            echo "::error::Refusing to build with less than ${DEPLOY_MIN_DOCKER_FREE_GB}GiB free inside the Docker VM after safe prune; found $(( ${DOCKER_FREE_KB:-0} / 1024 / 1024 ))GiB. Run the disk recovery path before rebuilding services."
            exit 1
          fi

      - name: Build and update services
        if: steps.changes.outputs.build_services != ''
        run: |
          cd "$DEPLOY_DIR"
          BUILD_SERVICES="${{ steps.changes.outputs.build_services }}"
          echo "Building: $BUILD_SERVICES"

          # Build only the changed services to save time, but use compose context
          for svc in $BUILD_SERVICES; do
            echo "--- Building $svc ---"
            # Some services might not be in docker-compose.yml yet or have different names
            # We use docker compose build <service_name> to respect the compose file.
            # `--force-rm` removes intermediate containers from failed/aborted
            # build stages so they don't accumulate on the runner between
            # deploys (BuildKit normally leaves them around for debugging).
            docker compose build --force-rm "$svc"
          done

      - name: Up
        run: |
          cd "$DEPLOY_DIR"
          RECREATE_SERVICES="${{ steps.changes.outputs.recreate_services }}"
          RECOVER_SERVICES=(api code-worker)
          WORKSPACES_VOLUME_NAME="${WORKSPACES_VOLUME_NAME:-agentprovision-agents_tenant_spaces}"
          WORKSPACES_COMPLETE_MARKER=".agentprovision_workspace_volume_migrated"
          workspace_migration_complete() {
            docker run --rm -v "$WORKSPACES_VOLUME_NAME:/volume:ro" alpine:3.20 \
              sh -c "test -f '/volume/$WORKSPACES_COMPLETE_MARKER'"
          }
          recover_on_error() {
            status=$?
            if [ "$status" -ne 0 ]; then
              if workspace_migration_complete; then
                echo "Up step failed after workspace migration; recreating workspace services on the new volume: ${RECOVER_SERVICES[*]}" >&2
                docker compose up -d --force-recreate --no-deps "${RECOVER_SERVICES[@]}" || true
              else
                echo "Up step failed before workspace migration completed; restarting existing workspace services: ${RECOVER_SERVICES[*]}" >&2
                docker compose start "${RECOVER_SERVICES[@]}" || true
              fi
            fi
            exit "$status"
          }
          trap recover_on_error EXIT
          QUIESCE_COMPOSE_SERVICES="${RECOVER_SERVICES[*]}" ./scripts/migrate_compose_workspaces_volume.sh
          # Recreate the services that need either a fresh image or a restart
          # over bind-mounted source/config. Plain `compose up -d` (no service
          # args) only starts stopped containers; it does NOT recreate already-
          # running containers whose images or bind-mounted code changed.
          if [ -n "$RECREATE_SERVICES" ]; then
            echo "Recreating services: $RECREATE_SERVICES"
            docker compose up -d --force-recreate --no-deps $RECREATE_SERVICES
          fi
          # Then bring up anything else that's stopped (db, cloudflared,
          # temporal, redis, etc.) without recreating live containers.
          echo "Ensuring all services are running..."
          docker compose up -d
          trap - EXIT

      - name: Assert no container mounts /actions-runner/_work
        # Phase 2.5 hard gate #5 (docs/plans/2026-06-07-luna-macos-app-control-plan.md):
        # a running container that bind-mounts the self-hosted runner's _work
        # checkout would let a CLI / code-worker session read or write the
        # runner's workspace (and other jobs' source) — a sandbox-escape risk.
        # This is the same check the release sentinel runs by hand; fail the
        # deploy if any live container exposes a _work source.
        run: |
          OFFENDERS="$(docker ps -q \
            | xargs -r docker inspect \
                --format '{{.Name}}{{range .Mounts}} {{.Source}}{{end}}' 2>/dev/null \
            | grep '_work' || true)"
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Live container(s) mount a runner _work source (sandbox-escape risk):"
            printf '%s\n' "$OFFENDERS"
            exit 1
          fi
          echo "OK — no live container mounts /actions-runner/_work"

      - name: Apply pending DB migrations
        # Runs after `docker compose up -d` so the db container is up,
        # but BEFORE the API serves traffic against the new image. The
        # script is idempotent: a re-deploy with no new migrations is
        # a no-op. Failure here fails the deploy — drift between the
        # image's ORM models and the live schema is exactly the kind
        # of bug this script exists to prevent.
        env:
          # Single source of truth for the container name — the
          # script honours this env var and so does the readiness
          # probe below. Override at workflow-dispatch time if the
          # compose project ever gets renamed.
          DB_CONTAINER: agentprovision-agents-db-1
        run: |
          cd "$DEPLOY_DIR"
          # The db needs a few seconds after `up -d` even when the
          # container was already running, because compose may have
          # restarted dependent services around it. Wait up to 30s
          # for pg_isready before invoking the apply script.
          for attempt in $(seq 1 30); do
            if docker exec "$DB_CONTAINER" pg_isready -U postgres -d agentprovision >/dev/null 2>&1; then
              break
            fi
            echo "waiting for db readiness ($attempt/30)"
            sleep 1
          done
          ./scripts/apply_pending_migrations.sh

      # ── End-of-pipeline orphan image cleanup ──
      # Runs LAST, after `compose up -d` has pinned new images to live
      # containers AND migrations have completed. `image prune -f`
      # (no `-a`) removes only DANGLING images — the just-replaced
      # previous versions whose tags got reassigned to the freshly
      # built layers. Nothing else; build cache, tagged-but-not-running
      # images, and volumes are all left alone here.
      #
      # Earlier iterations tried more aggressive cleanup at this
      # point (PR #465) and earlier in the pipeline (PR #463); both
      # introduced wedges (container prune killing the restart fast
      # path; aggressive prune mid-pipeline causing BuildKit ref-
      # counting to stick). On-host disk maintenance is the
      # auto-prune sentinel's job; the deploy's only cleanup
      # responsibility is removing the orphans it itself just
      # created.
      - name: Prune orphan images
        run: |
          echo "── Disk before orphan prune ──"
          df -h /System/Volumes/Data | tail -1 || true
          docker image prune -f 2>&1 | tail -3 || true
          echo "── Disk after orphan prune ──"
          df -h /System/Volumes/Data | tail -1 || true

      # ── Gated emergency disk cleanup ──
      # The auto-prune sentinel (PR #476 family) is meant to own
      # ongoing disk maintenance, but on machines where the launchd
      # job isn't installed/running, deploys would silently bleed disk
      # until the next build hits ENOSPC mid-image-export (observed
      # 2026-05-16: two consecutive deploys failed at "exporting to
      # image" before this gate was added).
      #
      # This step does NOT replace the sentinel; it is a deploy-time
      # emergency valve that kicks in ONLY when host disk crosses
      # bands. Below 80% it is a no-op. Between 80-85% it reclaims
      # build cache (always safe, no BuildKit wedge risk since
      # build/export are already done). Above 85% it additionally
      # recycles the code-worker container writable layer (the
      # historical biggest offender — accumulates CLI session scratch
      # at /tmp/* inside the container; recreate flushes 20+ GB in
      # one shot without touching tenant volumes since workspaces
      # are mounted on the api service).
      #
      # Volumes are NEVER pruned here — workspaces, db data, redis
      # AOF, temporal state all live on volumes. See
      # docs/plans/docker_disk_full_recovery.md (memory) for the
      # rationale.
      - name: Emergency disk cleanup (gated)
        if: always()
        run: |
          set +e
          DISK_PCT=$(df /System/Volumes/Data | tail -1 | awk '{gsub("%","",$5); print $5}')
          echo "host disk usage: ${DISK_PCT}%"
          if [ -z "$DISK_PCT" ]; then
            echo "could not read disk %; skipping"
            exit 0
          fi
          if [ "$DISK_PCT" -lt 80 ]; then
            echo "below 80% — no-op"
            exit 0
          fi
          echo "── above 80%: builder prune ──"
          # `if: always()` keeps the builder-prune running even after a
          # failed deploy — that's the most valuable case, since failed
          # exporter-to-image runs leave the largest BuildKit garbage
          # behind. Code-worker recycle below is gated more tightly so
          # we don't kill active CLI subprocesses mid-session.
          docker builder prune -af 2>&1 | tail -3 || true
          if [ "$DISK_PCT" -ge 90 ]; then
            echo "── above 90%: consider recycling code-worker writable layer ──"
            # Unit-aware parse of `docker ps -s` Size column. The raw
            # value is e.g. "24.7GB (virtual 30.1GB)" — the earlier
            # implementation stripped the suffix and treated "24.7" as
            # KB, so the threshold check never fired. Switch on the
            # unit suffix and convert to KB explicitly. Log the raw
            # string so on-call can debug if the parse ever misses.
            CW_RAW=$(docker ps -s --filter "name=code-worker" --format "{{.Size}}" | head -1 | awk '{print $1}')
            echo "code-worker raw size: '$CW_RAW'"
            CW_NUM=$(echo "$CW_RAW" | sed -E 's/[^0-9.]//g')
            CW_UNIT=$(echo "$CW_RAW" | sed -E 's/[0-9.]//g')
            case "$CW_UNIT" in
              GB|GiB) CW_SIZE_KB=$(awk -v n="$CW_NUM" 'BEGIN{print int(n*1024*1024)}') ;;
              MB|MiB) CW_SIZE_KB=$(awk -v n="$CW_NUM" 'BEGIN{print int(n*1024)}') ;;
              kB|KB|KiB) CW_SIZE_KB=$(awk -v n="$CW_NUM" 'BEGIN{print int(n)}') ;;
              B|"") CW_SIZE_KB=$(awk -v n="$CW_NUM" 'BEGIN{print int(n/1024)}') ;;
              *) CW_SIZE_KB=0 ;;
            esac
            echo "parsed code-worker size: ${CW_SIZE_KB} KB (threshold 5242880)"
            if [ -n "$CW_SIZE_KB" ] && [ "$CW_SIZE_KB" -gt 5242880 ]; then
              # >5 GiB — worth recycling, BUT only if no CLI subprocess
              # is currently running. force-recreate would kill in-flight
              # claude/codex/gemini sessions and surface as a chat failure
              # to the user; we'd rather defer the cleanup one deploy
              # cycle than corrupt an active session.
              ACTIVE_CLI_COUNT=$(docker exec agentprovision-agents-code-worker-1 \
                sh -c "pgrep -f 'claude|codex|gemini' | wc -l" 2>/dev/null || echo 0)
              # Strip any whitespace from `wc -l` output before integer compare.
              ACTIVE_CLI_COUNT=$(echo "$ACTIVE_CLI_COUNT" | tr -d ' ')
              echo "active CLI processes in code-worker: ${ACTIVE_CLI_COUNT}"
              if [ "${ACTIVE_CLI_COUNT:-0}" -gt 0 ]; then
                echo "active CLIs running — skipping code-worker recycle to avoid killing in-flight sessions"
              else
                cd "$DEPLOY_DIR"
                docker compose up -d --force-recreate code-worker 2>&1 | tail -5 || true
              fi
            else
              echo "code-worker layer below 5 GiB threshold; skipping recycle"
            fi
          fi
          echo "── disk after gated cleanup ──"
          df -h /System/Volumes/Data | tail -1 || true
