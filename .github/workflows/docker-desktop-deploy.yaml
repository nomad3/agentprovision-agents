name: Docker Desktop Deployment

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-desktop-deploy.yaml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - rebuild-all

# Self-hosted runners share `_work/<repo>/<repo>` across concurrent jobs. If
# this workflow races with luna-client-build (or any other actions/checkout
# job), each `actions/checkout@v4` defaults to `clean: true` and wipes the
# workdir AFTER our hydration step. This was the root cause of the
# 2026-05-08 outage: cloudflared came up with an empty creds dir → tunnel
# down → web UI unreachable. One deploy at a time fixes it.
concurrency:
  group: docker-desktop-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed services
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "apps/api")
          SERVICES=""
          echo "$CHANGED" | grep -q "apps/api/" && SERVICES="$SERVICES api orchestration-worker"
          echo "$CHANGED" | grep -q "apps/web/" && SERVICES="$SERVICES web"
          echo "$CHANGED" | grep -q "apps/code-worker/" && SERVICES="$SERVICES code-worker"
          echo "$CHANGED" | grep -q "apps/embedding-service/" && SERVICES="$SERVICES embedding-service"
          echo "$CHANGED" | grep -q "apps/memory-core/" && SERVICES="$SERVICES memory-core"
          echo "$CHANGED" | grep -q "apps/mcp-server/" && SERVICES="$SERVICES mcp-tools"
          echo "$CHANGED" | grep -q "apps/luna-client/" && SERVICES="$SERVICES luna-client"
          
          if [ -z "$SERVICES" ] || [ "${{ github.event.inputs.action }}" = "rebuild-all" ]; then
            SERVICES="api web code-worker orchestration-worker embedding-service memory-core mcp-tools luna-client"
          fi
          
          # Dedup services
          SERVICES=$(echo $SERVICES | tr ' ' '\n' | sort -u | tr '\n' ' ')
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "Services to build: $SERVICES"

      - name: Build and update services
        run: |
          SERVICES="${{ steps.changes.outputs.services }}"
          echo "Updating: $SERVICES"
          
          # Build only the changed services to save time, but use compose context
          for svc in $SERVICES; do
            echo "--- Building $svc ---"
            # Some services might not be in docker-compose.yml yet or have different names
            # We use docker compose build <service_name> to respect the compose file
            docker compose build $svc || echo "Skipping $svc (not in compose or build error)"
          done

      - name: Hydrate secrets and verify
        run: |
          # Self-hosted runners can have concurrent actions/checkout@v4 from
          # other workflows wipe the workdir AFTER an earlier hydration step.
          # We do this just before `compose up` so it's the last write before
          # docker reads the volume mounts.
          #
          # Hard requirement: every file in REQUIRED must exist after this
          # step or the deploy fails. Silent omissions are how cloudflared
          # came up with an empty creds dir on 2026-05-08.
          set -euo pipefail
          SRC="$HOME/Documents/GitHub/servicetsunami-agents"

          # Files that must be present in the runner workdir for the stack
          # to come up correctly. Source path → destination (relative to repo
          # root). Symlinks for env files (so dev edits propagate) and copies
          # for cloudflared creds (cloudflared dereferences -ro mounts and
          # symlink targets need their own perms).
          declare -a SYMLINKS=(
            "apps/api/.env"
            ".env"
          )
          declare -a COPIES=(
            "cloudflared/credentials.json"
            "cloudflared/cert.pem"
          )

          for f in "${SYMLINKS[@]}"; do
            if [ ! -f "$SRC/$f" ]; then
              echo "::error::Missing source secret on runner host: $SRC/$f"
              exit 1
            fi
            mkdir -p "$(dirname "$f")"
            ln -sf "$SRC/$f" "$f"
            echo "Linked $f -> $SRC/$f"
          done

          for f in "${COPIES[@]}"; do
            if [ ! -f "$SRC/$f" ]; then
              echo "::error::Missing source secret on runner host: $SRC/$f"
              exit 1
            fi
            mkdir -p "$(dirname "$f")"
            cp -f "$SRC/$f" "$f"
            chmod 0400 "$f"
            echo "Copied $f"
          done

          # Final assertion — fail loud if any expected file isn't readable.
          for f in "${SYMLINKS[@]}" "${COPIES[@]}"; do
            if [ ! -r "$f" ]; then
              echo "::error::Hydrated file unreadable after copy/symlink: $f"
              exit 1
            fi
          done
          echo "All required secrets present and readable."

      - name: Up and prune
        run: |
          echo "Starting services..."
          docker compose up -d

          echo "Cleaning up dangling images..."
          docker image prune -f || true
