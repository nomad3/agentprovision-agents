name: Docker Desktop Deployment

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'  # Phase 1.5: rebuild on shared cli_orchestrator changes
      - 'docker-compose.yml'
      - '.github/workflows/docker-desktop-deploy.yaml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - rebuild-all

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      # Phase 1.5 bind-mounts target apps/api/cli_orchestrator +
      # apps/code-worker/cli_orchestrator. Docker holds those paths open
      # while the containers are running, and the runner's pre-checkout
      # cleanup hits EACCES on rmdir. Stop the affected containers using
      # the user's main repo clone (which has docker-compose.yml
      # available even before this workflow checks out) so the bind-mount
      # is released before actions/checkout runs.
      - name: Pre-checkout — release bind-mounts
        shell: bash
        run: |
          SRC="$HOME/Documents/GitHub/agentprovision-agents"
          if [ -f "$SRC/docker-compose.yml" ]; then
            (cd "$SRC" && docker compose stop api orchestration-worker code-worker 2>&1 | tail -5) || true
          fi
          # Remove the phantom dirs left in the runner workspace from
          # previous deploys; safe because the containers are stopped.
          for phantom in \
            "$GITHUB_WORKSPACE/apps/api/cli_orchestrator" \
            "$GITHUB_WORKSPACE/apps/code-worker/cli_orchestrator"; do
            [ -d "$phantom" ] && (rmdir "$phantom" 2>/dev/null || rm -rf "$phantom" 2>/dev/null) || true
          done
        continue-on-error: true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # `clean: true` (default) calls rm -rf on the working tree before
          # syncing. Phase 1.5 introduced docker-compose bind-mounts targeted
          # at `apps/api/cli_orchestrator` + `apps/code-worker/cli_orchestrator`
          # — Docker creates phantom (empty, root-owned) target directories
          # at those paths on the host that the runner can't rmdir while
          # the containers are running, and stopping the containers in
          # pre-checkout is impossible (no repo on disk yet). Switch to
          # clean: false and do an explicit git-clean below that excludes
          # only the bind-mount phantoms.
          clean: false

      - name: Reset working tree (skipping Docker bind-mount phantoms)
        run: |
          # Equivalent to clean: true but with explicit excludes for the
          # Phase 1.5 docker-compose bind-mount targets. Without these
          # excludes the runner fails with EACCES on rmdir.
          git reset --hard HEAD
          git clean -fd \
            -e apps/api/cli_orchestrator \
            -e apps/code-worker/cli_orchestrator \
            -e apps/api/.env \
            -e .env \
            -e cloudflared/credentials.json \
            -e cloudflared/cert.pem

      - name: Symlink env files
        run: |
          # The .env files are gitignored but persist on the self-hosted runner's
          # main working copy. Symlink them into the checkout so docker compose
          # can read them.
          SRC="$HOME/Documents/GitHub/agentprovision-agents"
          for envfile in apps/api/.env .env; do
            if [ -f "$SRC/$envfile" ] && [ ! -f "$envfile" ]; then
              ln -sf "$SRC/$envfile" "$envfile"
              echo "Linked $envfile"
            fi
          done
          # Copy cloudflared credentials that are gitignored but required for the tunnel
          for cffile in cloudflared/credentials.json cloudflared/cert.pem; do
            if [ -f "$SRC/$cffile" ] && [ ! -f "$cffile" ]; then
              cp "$SRC/$cffile" "$cffile"
              echo "Copied $cffile"
            fi
          done

      - name: Detect changed services
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "apps/api")
          SERVICES=""
          echo "$CHANGED" | grep -q "apps/api/" && SERVICES="$SERVICES api orchestration-worker"
          echo "$CHANGED" | grep -q "apps/web/" && SERVICES="$SERVICES web"
          echo "$CHANGED" | grep -q "apps/code-worker/" && SERVICES="$SERVICES code-worker"
          echo "$CHANGED" | grep -q "apps/embedding-service/" && SERVICES="$SERVICES embedding-service"
          echo "$CHANGED" | grep -q "apps/memory-core/" && SERVICES="$SERVICES memory-core"
          echo "$CHANGED" | grep -q "apps/mcp-server/" && SERVICES="$SERVICES mcp-tools"
          echo "$CHANGED" | grep -q "apps/luna-client/" && SERVICES="$SERVICES luna-client"
          # Phase 1.5: cli_orchestrator package is shared by api, orchestration-worker
          # and code-worker — any change rebuilds all three.
          echo "$CHANGED" | grep -q "packages/cli_orchestrator/" && SERVICES="$SERVICES api orchestration-worker code-worker"
          
          if [ -z "$SERVICES" ] || [ "${{ github.event.inputs.action }}" = "rebuild-all" ]; then
            SERVICES="api web code-worker orchestration-worker embedding-service memory-core mcp-tools luna-client"
          fi
          
          # Dedup services
          SERVICES=$(echo $SERVICES | tr ' ' '\n' | sort -u | tr '\n' ' ')
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "Services to build: $SERVICES"

      - name: Build and update services
        run: |
          SERVICES="${{ steps.changes.outputs.services }}"
          echo "Updating: $SERVICES"
          
          # Build only the changed services to save time, but use compose context
          for svc in $SERVICES; do
            echo "--- Building $svc ---"
            # Some services might not be in docker-compose.yml yet or have different names
            # We use docker compose build <service_name> to respect the compose file
            docker compose build $svc || echo "Skipping $svc (not in compose or build error)"
          done

      - name: Up and prune
        run: |
          echo "Starting services..."
          docker compose up -d

          echo "Cleaning up dangling images..."
          docker image prune -f || true

      - name: Apply pending DB migrations
        # Runs after `docker compose up -d` so the db container is up,
        # but BEFORE the API serves traffic against the new image. The
        # script is idempotent: a re-deploy with no new migrations is
        # a no-op. Failure here fails the deploy — drift between the
        # image's ORM models and the live schema is exactly the kind
        # of bug this script exists to prevent.
        env:
          # Single source of truth for the container name — the
          # script honours this env var and so does the readiness
          # probe below. Override at workflow-dispatch time if the
          # compose project ever gets renamed.
          DB_CONTAINER: agentprovision-agents-db-1
        run: |
          # The db needs a few seconds after `up -d` even when the
          # container was already running, because compose may have
          # restarted dependent services around it. Wait up to 30s
          # for pg_isready before invoking the apply script.
          for i in $(seq 1 30); do
            if docker exec "$DB_CONTAINER" pg_isready -U postgres -d agentprovision >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          ./scripts/apply_pending_migrations.sh
