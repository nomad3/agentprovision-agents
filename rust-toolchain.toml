# Workspace-wide Rust toolchain pin. Keeps CI builds reproducible across
# all 6 cross-compile targets (mac arm64/x64, linux x64/arm64-musl,
# windows x64/arm64) and matches what the agentprovision-cli + agentprovision-core
# crates declare in their Cargo.toml `rust-version` field.
#
# Bump deliberately — pinning here pins the toolchain everywhere downstream.
[toolchain]
channel = "1.83.0"
components = ["rustfmt", "clippy"]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "x86_64-pc-windows-msvc",
    "aarch64-pc-windows-msvc",
]
profile = "minimal"
