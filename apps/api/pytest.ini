[pytest]
# pytest's rootdir auto-discovery walks UP from cwd looking for a pytest.ini.
# Without this file, it finds the repo-root pytest.ini and sets rootdir to
# the repo root — at which point `apps/api` is NOT on sys.path, and every
# test that does `from app... import ...` fails with `ModuleNotFoundError`.
# The CI api jobs were silently running zero tests because of this; the
# `|| true` + `if-no-files-found: ignore` masking made it look green.
#
# Pinning rootdir here + `pythonpath = .` makes `app/` importable.
testpaths = tests
asyncio_mode = auto
pythonpath = .
markers =
    integration: requires a real Postgres at DATABASE_URL (pgvector queries)
